      <h1>Jauge — Simulateur CASC-SVP et FNAS</h1>
      <p>Jauge est un simulateur gratuit et confidentiel qui permet aux salariés du spectacle vivant (intermittents et permanents) d'estimer leurs droits auprès des deux fonds d'action sociale de la branche :</p>
      <ul>
        <li><strong>CASC-SVP</strong> — Comité d'Action Sociale et Culturelle du Spectacle Vivant Privé, pour les salariés relevant de la convention collective du spectacle vivant privé.</li>
        <li><strong>FNAS</strong> — Fonds National d'Action Sociale, pour les salariés relevant de la convention collective des entreprises artistiques et culturelles.</li>
      </ul>
      <p>Le calcul est effectué localement dans votre navigateur. Aucune donnée personnelle n'est transmise ni stockée. L'outil ne nécessite pas de JavaScript pour être consulté ? Si, en effet — <strong>activez JavaScript pour lancer le simulateur</strong>.</p>
